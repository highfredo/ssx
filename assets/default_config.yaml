# ssx configuration file
# https://github.com/highfredo/ssx

# Log level: "debug", "info", "warn" or "error" (default: "info").
# Logs are written to /tmp/ssx.log.
log_level: "info"

# UI theme: customize the color palette.
# Each value accepts a hex color (#RRGGBB), basic CSS name, or ANSI number.
# Leave a field empty (or remove it) to keep the default color.
#
# Defaults (purple/indigo palette):
# theme:
#   primary:    "#7C3AED"   # accent / title background
#   highlight:  "#1E1B4B"   # selected row background (dark)
#   success:    "#10B981"   # open state / success messages
#   muted:      "#6B7280"   # closed state / help text
#   danger:     "#EF4444"   # errors
#   border:     "#374151"   # panel borders
# 	defaultTag: "#312E81"   # default tag color (used when no color is set in ~/.ssh/config)
theme: {}

# FTP/SFTP client configuration.
#
# client: preferred client to use: "winscp" or "filezilla"
#         leave empty to auto-detect (WinSCP first, then FileZilla)
# path:   optional custom path to the executable
#         leave empty to search in default locations
#
# Example:
# ftp:
#   client: filezilla
#   path: /usr/bin/filezilla
ftp:
  client: ""
  path: ""

# Tag colors: assign a background color (hex or CSS name) to each tag.
# Colors defined here are used as fallback; colors in ~/.ssh/config take priority.
#
# Example:
# tags:
#   personal: "#10B981"
#   work: "#3B82F6"
#   production: "#EF4444"
tags: {}

# Keyboard shortcuts: customize key bindings for every action.
# Each value is a space-separated list of keys (e.g. "ctrl+t tab").
# Leave a field empty (or remove it) to keep the default.
#
# keybindings:
#   quit: "ctrl+c"           # quit the application
#
#   hosts:                   # host list page
#     connect:       "enter"              # connect to the selected host
#     copy_key:      "ctrl+a"             # ssh-copy-id to the selected host
#     tunnels:       "ctrl+t tab"         # open tunnel manager for the host
#     open_tunnels:  "ctrl+o"             # view all currently open tunnels
#     ftp:           "ctrl+x"             # launch SFTP client
#     info:          "ctrl+g"             # show effective SSH config (ssh -G)
#     open_ssh_dir:  "ctrl+alt+p"         # open ~/.ssh in file manager
#     open_config:   "ctrl+alt+s"         # open ssx config file
#     quick_connect: "ctrl+enter ctrl+j"  # connect to typed hostname directly
#
#   tunnels:                 # tunnel page
#     toggle:  "enter"       # open/close the selected tunnel
#     browser: "ctrl+x"      # open tunnel URL in browser
#
#   navigation:              # shared by all lists AND the info scroll view
#     cursor_up:      "up"       # move cursor / scroll up one line
#     cursor_down:    "down"     # move cursor / scroll down one line
#     prev_page:      "pgup"     # previous page / scroll up one page
#     next_page:      "pgdown"   # next page / scroll down one page
#     go_to_start:    "home"     # jump to first item
#     go_to_end:      "end"      # jump to last item
#     show_full_help: "f1"       # toggle full help panel (open and close)
#     half_page_up:   "ctrl+u"   # scroll up half page (info view)
#     half_page_down: "ctrl+d"   # scroll down half page (info view)
#     back:           "tab esc"  # go back / clear filter (info view)


